<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tópicos Literarios</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parch: #f5efe0;
    --gold: #c9a84c;
    --rust: #8b3a2a;
    --sage: #4a6741;
    --slate: #2d3b4e;
    --cream: #faf7f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', serif;
    color: var(--parch);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 80% at 20% 50%, #2a1f0e44, transparent),
      radial-gradient(ellipse 80% 120% at 80% 30%, #1a2a1a33, transparent),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.75' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 6vw;
    opacity: 0;
    transform: translateY(40px) scale(0.97);
    transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .slide.exit {
    opacity: 0;
    transform: translateY(-40px) scale(0.97);
    transition: opacity .5s ease, transform .5s ease;
  }

  /* ── Cover slide ── */
  .cover {
    background: linear-gradient(160deg, #0e0b06 0%, #1c1409 60%, #0e1510 100%);
  }

  .cover .ornament {
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: .4em;
    margin-bottom: 2rem;
    opacity: .7;
  }

  .cover h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
    color: var(--parch);
    text-shadow: 0 2px 40px #c9a84c55;
    margin-bottom: 1.5rem;
  }

  .cover h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .cover p {
    font-size: 1.25rem;
    color: #b8a882;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .cover .line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
  }

  /* ── Topic slides ── */
  .topic {
    background: linear-gradient(145deg, #0f0c07 0%, #181208 50%, #0c1009 100%);
    max-width: 980px;
    margin: 0 auto;
    text-align: left;
    align-items: flex-start;
  }

  .topic-header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: .6rem;
  }

  .topic-number {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--gold);
    opacity: .25;
    line-height: 1;
    min-width: 3.5rem;
  }

  .topic h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3.2rem);
    font-weight: 700;
    font-style: italic;
    color: var(--parch);
    line-height: 1.15;
  }

  .topic h2 .latin {
    display: block;
    font-size: .55em;
    font-style: normal;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: .3rem;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
    margin: 1.2rem 0;
    opacity: .4;
  }

  .badges {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .badge {
    font-size: .72rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .3rem .9rem;
    border: 1px solid;
    border-radius: 2px;
    font-weight: 400;
  }

  .badge.era   { border-color: var(--gold);  color: var(--gold);  background: #c9a84c11; }
  .badge.genre { border-color: #7ea8d0;      color: #7ea8d0;      background: #4a7faa11; }
  .badge.theme { border-color: #b07ea8;      color: #b07ea8;      background: #8a4a8811; }

  .meaning {
    font-size: clamp(1rem, 1.8vw, 1.22rem);
    color: #d9cdb4;
    line-height: 1.85;
    margin-bottom: 1.4rem;
    font-weight: 300;
  }

  .meaning strong { color: var(--parch); font-weight: 400; }

  .origin-box {
    border-left: 2px solid var(--gold);
    padding-left: 1.2rem;
    margin-bottom: 1.2rem;
  }

  .origin-box .label {
    font-size: .7rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: .4rem;
  }

  .origin-box p {
    font-size: clamp(.9rem, 1.5vw, 1.05rem);
    color: #b8a882;
    line-height: 1.7;
    font-style: italic;
  }

  .examples {
    display: flex;
    gap: .6rem;
    flex-wrap: wrap;
  }

  .ex-tag {
    font-size: .8rem;
    background: #ffffff08;
    border: 1px solid #ffffff18;
    padding: .25rem .8rem;
    border-radius: 2px;
    color: #c8bfa4;
  }

  /* ── Progress ── */
  #progress {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #ffffff0a;
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #e8c97a);
    transition: width .6s ease;
    box-shadow: 0 0 10px var(--gold);
  }

  /* ── Nav ── */
  #nav {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    z-index: 100;
    background: #0e0b0680;
    backdrop-filter: blur(12px);
    border: 1px solid #ffffff14;
    border-radius: 50px;
    padding: .7rem 1.6rem;
  }

  #nav button {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    padding: .3rem .7rem;
    border-radius: 50px;
    transition: background .2s, color .2s;
    line-height: 1;
  }

  #nav button:hover { background: #c9a84c22; }
  #nav button:disabled { opacity: .2; cursor: default; }

  #counter {
    font-family: 'Playfair Display', serif;
    font-size: .9rem;
    color: #8a7d60;
    min-width: 4rem;
    text-align: center;
  }

  /* ── Index ── */
  #index-btn {
    position: fixed;
    top: 1.5rem;
    right: 1.8rem;
    z-index: 200;
    background: #0e0b0680;
    backdrop-filter: blur(12px);
    border: 1px solid #ffffff14;
    color: var(--gold);
    font-size: .75rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .5rem 1.2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background .2s;
  }
  #index-btn:hover { background: #c9a84c22; }

  #index-modal {
    position: fixed;
    inset: 0;
    background: #000000cc;
    backdrop-filter: blur(16px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #index-modal.open { display: flex; }

  .index-inner {
    background: #141009;
    border: 1px solid #c9a84c33;
    border-radius: 8px;
    padding: 2.5rem 3rem;
    max-width: 700px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }

  .index-inner h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: .6rem;
  }

  .index-item {
    padding: .6rem 1rem;
    border: 1px solid #ffffff12;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    font-size: .9rem;
    color: #c8bfa4;
  }

  .index-item:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: #c9a84c11;
  }

  .index-item .idx-num {
    color: var(--gold);
    opacity: .5;
    font-size: .75rem;
    margin-right: .4rem;
  }

  .close-modal {
    display: block;
    margin: 1.5rem auto 0;
    background: none;
    border: 1px solid #ffffff22;
    color: #8a7d60;
    padding: .5rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all .2s;
    font-size: .85rem;
  }
  .close-modal:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Title slide label ── */
  .slide-label {
    position: fixed;
    top: 1.5rem;
    left: 1.8rem;
    font-size: .72rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #5a5040;
    z-index: 100;
  }

  /* ── Keyboard hint ── */
  .hint {
    position: fixed;
    bottom: 6.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: .7rem;
    color: #3a3226;
    letter-spacing: .1em;
    z-index: 100;
  }

  scrollbar-width: thin;
  scrollbar-color: #c9a84c44 transparent;
</style>
</head>
<body>

<div class="slide-label">Tópicos Literarios</div>

<button id="index-btn">Índice ▾</button>

<div id="index-modal">
  <div class="index-inner">
    <h3>Índice de Tópicos</h3>
    <div class="index-grid" id="index-grid"></div>
    <button class="close-modal" onclick="closeIndex()">Cerrar</button>
  </div>
</div>

<div id="deck"></div>

<div id="progress"><div id="progress-bar"></div></div>

<div id="nav">
  <button id="prev" onclick="move(-1)">←</button>
  <span id="counter">0 / 0</span>
  <button id="next" onclick="move(1)">→</button>
</div>

<p class="hint">← → teclas o botones para navegar</p>

<script>

    <div class="ornament">🙶 ☙ 🙴</div>
    <h1>Tópicos <em>Literarios</em></h1>
    <div class="line"></div>
    <p>Breviario de Tradición Clásica</p>
  `;
  deck.appendChild(cover);

  // Generate Topics
  TOPICOS.forEach((t, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide topic';
    slide.innerHTML = `
      <div class="topic-header">
        <span class="topic-number">${(i + 1).toString().padStart(2, '0')}</span>
        <h2>${t.title} <span class="latin">${t.latin}</span></h2>
      </div>
      <div class="divider"></div>
      <div class="badges">
        <span class="badge era">${t.era}</span>
        <span class="badge theme">${t.theme}</span>
      </div>
      <p class="meaning">${t.meaning}</p>
      <div class="origin-box">
        <div class="label">Origen y Contexto</div>
        <p>${t.origin}</p>
      </div>
      <div class="examples">
        ${t.examples.map(ex => `<span class="ex-tag">${ex}</span>`).join('')}
      </div>
    `;
    deck.appendChild(slide);

    // Index grid
    const idxItem = document.createElement('div');
    idxItem.className = 'index-item';
    idxItem.innerHTML = `<span class="idx-num">${i + 1}</span> ${t.title}`;
    idxItem.onclick = () => { goTo(i + 1); closeIndex(); };
    grid.appendChild(idxItem);
  });

  updateNav();
}

function move(dir) {
  const slides = document.querySelectorAll('.slide');
  if (current + dir < 0 || current + dir >= slides.length) return;

  slides[current].classList.remove('active');
  slides[current].classList.add('exit');

  current += dir;

  setTimeout(() => {
    slides.forEach(s => s.classList.remove('exit'));
    slides[current].classList.add('active');
    updateNav();
  }, 50);
}

function goTo(index) {
  const slides = document.querySelectorAll('.slide');
  slides.forEach(s => s.classList.remove('active', 'exit'));
  current = index;
  slides[current].classList.add('active');
  updateNav();
}

function updateNav() {
  const slides = document.querySelectorAll('.slide');
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === slides.length - 1;
  document.getElementById('counter').innerText = `${current} / ${slides.length - 1}`;
  document.getElementById('progress-bar').style.width = `${(current / (slides.length - 1)) * 100}%`;
}

document.getElementById('index-btn').onclick = () => document.getElementById('index-modal').classList.add('open');
window.closeIndex = () => document.getElementById('index-modal').classList.remove('open');

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') move(1);
  if (e.key === 'ArrowLeft') move(-1);
  if (e.key === 'Escape') closeIndex();
});

init();
</script>
</body>
</html>
